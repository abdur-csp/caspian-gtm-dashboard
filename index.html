<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caspian Trade — GTM KPI Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex}

/* ── Sidebar ── */
.sidebar{
  width:220px;min-height:100vh;background:#f4f5f7;border-right:1px solid #e2e4e8;
  padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10;
}
.sidebar-logo{padding:0 20px 24px;font-size:20px;font-weight:800;letter-spacing:0.3px;color:#0f3d3e}
.sidebar-logo span{color:#1a1a1a}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;
  color:#555;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;
}
.nav-item:hover{background:#ebedf0;color:#1a1a1a}
.nav-item.active{background:#e8f0f0;color:#0f3d3e;border-left-color:#0f3d3e;font-weight:600}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.sidebar-footer{padding:16px 20px;font-size:11px;color:#999}

/* ── Main Content ── */
.main{margin-left:220px;flex:1;min-height:100vh;background:#fff}
.topbar{
  display:flex;justify-content:space-between;align-items:center;padding:16px 32px;
  border-bottom:1px solid #e8e8e8;background:#fff;position:sticky;top:0;z-index:5;
}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-size:18px;font-weight:700;color:#1a1a1a}
.topbar-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:11px;color:#999}

/* ── Period Toggle ── */
.period-toggle{display:flex;background:#f0f0f0;border-radius:6px;overflow:hidden}
.period-btn{
  padding:6px 14px;font-size:12px;font-weight:600;font-family:'Archivo',sans-serif;
  border:none;background:transparent;color:#666;cursor:pointer;transition:all 0.15s;
}
.period-btn.active{background:#0f3d3e;color:#fff;border-radius:6px}

/* ── Week Selector ── */
.week-select{
  font-family:'Archivo',sans-serif;font-size:13px;font-weight:500;
  background:#fff;color:#1a1a1a;border:1px solid #d0d0d0;border-radius:6px;
  padding:6px 12px;cursor:pointer;min-width:200px;
}
.week-select:focus{outline:none;border-color:#0f3d3e}

/* ── Dashboard Grid ── */
.dashboard{padding:24px 32px;max-width:1360px}
.section{margin-bottom:28px}
.section-header{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:8px;
  border-bottom:2px solid #e8e8e8;
}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#1a1a1a}

/* ── Cards ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.card{
  background:#fafafa;border-radius:8px;padding:16px 18px;border:1px solid #eaeaea;
  transition:box-shadow 0.15s;
}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;font-weight:600}
.card-value{font-size:26px;font-weight:800;color:#1a1a1a;margin-bottom:4px;line-height:1.1}
.card-value.currency{color:#0f3d3e}
.card-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:#999}
.card-meta .prior{font-size:11px;color:#aaa}
.delta{font-weight:600;display:inline-flex;align-items:center;gap:2px;font-size:12px}
.delta.up{color:#16a34a}
.delta.down{color:#dc2626}
.delta.neutral{color:#bbb}
.snapshot-badge{display:inline-block;font-size:10px;background:#f0f0f0;color:#888;padding:2px 7px;border-radius:3px;font-weight:500}
.breakdown{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.breakdown .tag{font-size:11px;background:#f0f0f0;padding:3px 8px;border-radius:4px;color:#666;font-weight:500}

/* ── Funnel ── */
.funnel-container{position:relative;padding:16px 0}
.funnel-visual{display:flex;flex-direction:column;align-items:center;gap:0;max-width:700px;margin:0 auto}
.funnel-stage{
  position:relative;text-align:center;padding:18px 24px;color:#fff;font-weight:600;
  transition:transform 0.15s;
}
.funnel-stage:hover{transform:scale(1.02)}
/* Each stage gets progressively narrower to create funnel shape */
.funnel-stage:nth-child(1){width:100%;background:#0f3d3e;border-radius:8px 8px 0 0}
.funnel-stage:nth-child(2){width:80%;background:#1a5c5e}
.funnel-stage:nth-child(3){width:60%;background:#267a7d}
.funnel-stage:nth-child(4){width:40%;background:#32999d;border-radius:0 0 8px 8px}
.funnel-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;opacity:0.85;margin-bottom:4px}
.funnel-value{font-size:28px;font-weight:800}
.funnel-delta{font-size:11px;opacity:0.8;margin-top:2px}
.funnel-connector{width:2px;height:8px;background:#ccc}

/* ── Mini Cards ── */
.mini-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.mini-card{
  background:#fafafa;border-radius:8px;padding:14px 16px;border:1px solid #eaeaea;text-align:center;
}
.mini-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px;font-weight:600}
.mini-value{font-size:20px;font-weight:800;color:#1a1a1a}
.mini-delta{font-size:11px;margin-top:3px}

/* ── Inline Stats Row ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.stat-box{
  background:#fafafa;border-radius:8px;padding:14px 16px;border:1px solid #eaeaea;
}
.stat-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:5px;font-weight:600}
.stat-value{font-size:20px;font-weight:800;color:#1a1a1a}
.stat-value.currency{color:#0f3d3e}
.stat-delta{font-size:11px;margin-top:3px}

/* ── Claims Pipeline Table ── */
.claims-table{width:100%;border-collapse:collapse;font-size:13px}
.claims-table th{
  text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;
  color:#888;font-weight:600;padding:8px 12px;border-bottom:2px solid #e8e8e8;
}
.claims-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.claims-table tr:hover{background:#fafafa}
.claims-table .stage-name{font-weight:600;color:#1a1a1a}
.claims-table .count-val{font-weight:700;font-size:15px}
.claims-table .dollar-val{font-weight:700;font-size:15px;color:#0f3d3e}

/* ── Loading & Error ── */
.loading{text-align:center;padding:80px;font-size:16px;color:#999}
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid #e8e8e8;border-top-color:#0f3d3e;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:16px;color:#dc2626;text-align:center;margin:40px}

/* ── Responsive ── */
@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0}
  .topbar{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .dashboard{padding:16px}
  .cards{grid-template-columns:1fr}
  .funnel-visual{max-width:100%}
  .funnel-stage:nth-child(1){width:100%}
  .funnel-stage:nth-child(2){width:90%}
  .funnel-stage:nth-child(3){width:80%}
  .funnel-stage:nth-child(4){width:70%}
}
</style>
</head>
<body>

<!-- Sidebar Navigation -->
<aside class="sidebar">
  <div class="sidebar-logo"><span>Caspian</span> Trade</div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-section="all">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

<!-- Main Content -->

      <div class="period-toggle" id="periodToggle">
        <button class="period-btn active" data-period="weekly">Weekly</button>
        <button class="period-btn" data-period="monthly">Monthly</button>
        <button class="period-btn" data-period="quarterly">Quarterly</button>
      </div>

    <div class="topbar-right">
      <select class="week-select" id="weekSelect" disabled><option>Loading...</option></select>

  <div id="app">

<script>
/* ══════════════════════════════════════════════════════════
   DATA CONFIG
   ══════════════════════════════════════════════════════════ */

const CSV_URL = 'https://docs.google.com/spreadsheets/d/1u-8smcV7dJTRZqGxdpl63GIPZBeBNiTOPnVnjPwDEuQ/gviz/tq?tqx=out:csv&sheet=Weekly%20Metrics%20Tracker';

/* Each key maps to a substring that identifies the row in the spreadsheet */
const METRIC_KEYS = {
  linkedinFollowers: 'New LinkedIns Followers',
  websiteVisits: 'Website Visits',
  emailsSent: 'Emails (Lemlist',
  linkedinDMs: 'LinkedIn DMs',
  callsDials: 'Calls+Dials',
  totalTouches: 'Sales Activity (Touches)',
  newCompanies: '# New Companies',
  outboundDeals: '# Outbound Deals',
  inboundDeals: '# Inbound Deals',
  conferenceDeals: '# Conference Deals',
  referrals: '# Referrals',
  totalNewDeals: '# New Deals',
  qualifiedDeals: '# New Qualified Deals',
  discoveryDeals: '# New Discovery Deal',
  newOffers: '# New Offers',
  signedDeals: '# New Committed (Signed)',
  pipelineValue: '$M Pipeline Value',
  uniqueDeals: '# of Unique Deals in Pipeline',
  avgDaysStage: '# Days Avg. Time in Stage',
  appsSubmitted: 'Applications Submitted to CBP',
  appsApproved: 'Applications Approved by CBP',
  appsInReview: 'Applications in Review by CBP',
  uniqueCustomersClaims: '# of Unique Customers w. Claims',
  claimsTransmitted: '$ Claims Transmitted',
  claimsPaid: '$ Claims Paid by CBP',
  bookedRevenue: '$ Booked Revenue',
  collectedRevenue: '$ Collected Revenue',
  claimsAwaitingSub: '# Claims Awaiting Submission',
  claimsAwaitingSubDollar: '$ Claims Awaiting Submission',
  claimsWithCBP: '# Claims With CBP (Awaiting Settlement)',
  claimsWithCBPDollar: '$ Claims With CBP (Awaiting Settlement)',
  revenueAwaitingCollection: '$ Caspian Revenue Awaiting Collection'
};

/* Balance metrics = point-in-time snapshots. Use latest value, don't sum. */
const BALANCE_METRICS = new Set([
  'pipelineValue','uniqueDeals','avgDaysStage','appsInReview',
  'claimsAwaitingSub','claimsAwaitingSubDollar','claimsWithCBP','claimsWithCBPDollar',
  'revenueAwaitingCollection'
]);

/* Metrics displayed as dollar amounts */
const CURRENCY_METRICS = new Set([
  'pipelineValue','claimsTransmitted','claimsPaid','bookedRevenue','collectedRevenue',
  'claimsAwaitingSubDollar','claimsWithCBPDollar','revenueAwaitingCollection'
]);

let allData = null;       // { metricKey: [val_week0, val_week1, ...] }
let weekColumns = [];     // [{ col, label, date }, ...] — most recent first
let currentPeriod = 'weekly';
let currentIdx = 0;       // selected index in the active period array
let periodData = null;    // aggregated data for the active period
let periodLabels = [];    // labels for the period selector dropdown

/* ══════════════════════════════════════════════════════════
   CSV PARSING
   ══════════════════════════════════════════════════════════ */

/* Handles quoted fields, commas inside quotes, and escaped double-quotes */
function parseCSV(text) {
  const rows = [];
  let current = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(current.trim()); current = '';
        rows.push(row); row = [];
        if (ch === '\r') i++;
      } else { current += ch; }
    }
  }
  if (current || row.length) { row.push(current.trim()); rows.push(row); }
  return rows;
}

/* Scan first 10 rows for one containing "Week N" labels */
function findWeekLabelRow(rows) {
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (rows[i].some(c => /^Week \d+$/.test(c))) return i;
  }
  return -1;
}

/* Scan first 10 rows for the "Week Ending" date header */
function findDatesRow(rows) {
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (rows[i].some(c => c === 'Week Ending')) return i;
  }
  return -1;
}

/* Convert raw cell value to a number (strip $, commas) */
function parseValue(raw) {
  if (!raw || raw === '' || raw === '-') return null;
  let s = raw.replace(/^\$/, '').replace(/,/g, '');
  const num = parseFloat(s);
  return isNaN(num) ? null : num;
}

/* Extract metric data from parsed CSV rows */
function processData(rows) {
  const weekLabelRowIdx = findWeekLabelRow(rows);
  const datesRowIdx = findDatesRow(rows);
  if (weekLabelRowIdx < 0 || datesRowIdx < 0) throw new Error('Could not locate week/date header rows in the spreadsheet');

  const weekLabelRow = rows[weekLabelRowIdx];
  const datesRow = rows[datesRowIdx];

  /* Identify all valid week columns (skip Week 68 = future placeholder) */
  weekColumns = [];
  for (let col = 0; col < weekLabelRow.length; col++) {
    const label = weekLabelRow[col];
    const date = datesRow[col] || '';
    if (/^Week \d+$/.test(label) && label !== 'Week 68') {
      weekColumns.push({ col, label, date });
    }
  }

  /* Map each metric key to an array of values (one per week, most-recent first) */
  const metrics = {};
  for (const [key, substring] of Object.entries(METRIC_KEYS)) {
    for (let r = 0; r < rows.length; r++) {
      const metricName = rows[r][3] || rows[r][2] || '';
      if (metricName.includes(substring)) {
        metrics[key] = weekColumns.map(wc => parseValue(rows[r][wc.col]));
        break;
      }
    }
    if (!metrics[key]) metrics[key] = weekColumns.map(() => null);
  }
  return metrics;
}

/* ══════════════════════════════════════════════════════════
   AGGREGATION — Monthly / Quarterly
   ══════════════════════════════════════════════════════════ */

/*
 * Groups weekly data into monthly or quarterly buckets.
 * Flow metrics (e.g. new deals) = sum of weeks in the period.
 * Balance metrics (e.g. pipeline value) = latest week's value (snapshot).
 */
function aggregateData(rawData, weekCols, period) {
  if (period === 'weekly') {
    periodLabels = weekCols.map(wc => `${wc.label} (ending ${wc.date})`);
    return rawData;
  }

  /* Parse each week's ending date to determine which month/quarter it belongs to */
  const buckets = {};
  const bucketOrder = [];

  weekCols.forEach((wc, idx) => {
    const d = new Date(wc.date);
    if (isNaN(d.getTime())) return;
    let key;
    if (period === 'monthly') {
      /* Group by year-month */
      key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    } else {
      /* Group by year-quarter */
      const q = Math.ceil((d.getMonth()+1)/3);
      key = `${d.getFullYear()}-Q${q}`;
    }
    if (!buckets[key]) { buckets[key] = []; bucketOrder.push(key); }
    buckets[key].push(idx);
  });

  /* Build aggregated metric arrays — one value per bucket */
  const aggregated = {};
  for (const mk of Object.keys(rawData)) {
    aggregated[mk] = bucketOrder.map(bk => {
      const indices = buckets[bk];
      if (BALANCE_METRICS.has(mk)) {
        /* Snapshot: use the most recent week's value in this period (index 0 = most recent) */
        const latest = indices[0];
        return rawData[mk][latest];
      } else {
        /* Flow: sum all non-null values in this period */
        let sum = null;
        for (const i of indices) {
          const v = rawData[mk][i];
          if (v !== null) sum = (sum || 0) + v;
        }
        return sum;
      }
    });
  }

  /* Build human-readable labels for the period dropdown */
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  periodLabels = bucketOrder.map(bk => {
    if (period === 'monthly') {
      const [y, m] = bk.split('-');
      return `${monthNames[parseInt(m)-1]} ${y}`;
    }
    return bk.replace('-',' ');
  });

  return aggregated;
}

/* ══════════════════════════════════════════════════════════
   FORMATTING HELPERS
   ══════════════════════════════════════════════════════════ */

/* Format a metric value for display */
function fmt(val, key) {
  if (val === null || val === undefined) return '—';
  if (key === 'pipelineValue') return '$' + val.toFixed(2) + 'M';
  if (key === 'avgDaysStage') return val.toFixed(0) + ' days';
  if (CURRENCY_METRICS.has(key)) {
    if (Math.abs(val) >= 1000000) return '$' + (val/1000000).toFixed(2) + 'M';
    if (Math.abs(val) >= 1000) return '$' + (val/1000).toFixed(1) + 'K';
    return '$' + val.toLocaleString('en-US', {maximumFractionDigits:0});
  }
  return val.toLocaleString('en-US', {maximumFractionDigits:0});
}

/* Render a percentage change indicator, or "Snapshot" badge for balance metrics */
function deltaHTML(curr, prev, key) {
  if (BALANCE_METRICS.has(key)) return '<span class="snapshot-badge">Snapshot</span>';
  if (curr === null || prev === null || prev === 0) return '<span class="delta neutral">—</span>';
  const pct = ((curr - prev) / Math.abs(prev) * 100);
  const cls = pct > 0 ? 'up' : pct < 0 ? 'down' : 'neutral';
  const arrow = pct > 0 ? '\u25B2' : pct < 0 ? '\u25BC' : '';
  return `<span class="delta ${cls}">${arrow} ${Math.abs(pct).toFixed(1)}%</span>`;
}

/* Show the prior period's value for comparison */
function priorLabel(val, key) {
  if (val === null) return '';
  return `<span class="prior">Prior: ${fmt(val, key)}</span>`;
}

/* ══════════════════════════════════════════════════════════
   COMPONENT BUILDERS
   ══════════════════════════════════════════════════════════ */

/* Standard metric card */
function cardHTML(label, key, idx) {
  const d = periodData;
  const curr = d[key][idx];
  const prev = d[key][idx + 1] !== undefined ? d[key][idx + 1] : null;
  const isCurr = CURRENCY_METRICS.has(key);
  return `<div class="card">
    <div class="card-label">${label}</div>
    <div class="card-value${isCurr ? ' currency' : ''}">${fmt(curr, key)}</div>
    <div class="card-meta">${deltaHTML(curr, prev, key)} ${priorLabel(prev, key)}</div>
  </div>`;
}

/* Small stat box for grid layouts */
function statBoxHTML(label, key, idx, isCurrency) {
  const d = periodData;
  const curr = d[key][idx];
  const prev = d[key][idx + 1] !== undefined ? d[key][idx + 1] : null;
  return `<div class="stat-box">
    <div class="stat-label">${label}</div>
    <div class="stat-value${isCurrency ? ' currency' : ''}">${fmt(curr, key)}</div>
    <div class="stat-delta">${deltaHTML(curr, prev, key)}</div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   RENDER DASHBOARD
   ══════════════════════════════════════════════════════════ */

function render(idx) {
  currentIdx = idx;
  const d = periodData;

  /* Convenience: current values for inline display */
  const ob = d.outboundDeals[idx];
  const ib = d.inboundDeals[idx];
  const conf = d.conferenceDeals[idx];
  const ref = d.referrals[idx];
  const emails = d.emailsSent[idx];
  const dms = d.linkedinDMs[idx];
  const calls = d.callsDials[idx];

  /* Funnel delta helper — shows raw count change for funnel stages */
  function funnelDelta(key) {
    const curr = d[key][idx];
    const prev = d[key][idx+1] !== undefined ? d[key][idx+1] : null;
    if (curr === null || prev === null) return '';
    const diff = curr - prev;
    if (diff === 0) return '<span style="opacity:0.7">No change</span>';
    const sign = diff > 0 ? '+' : '';
    const color = diff > 0 ? '#16a34a' : '#dc2626';

/* ══════════════════════════════════════════════════════════
   CONTROLS: Period Toggle, Selector, Sidebar
   ══════════════════════════════════════════════════════════ */

/* Populate the dropdown with period labels */
function populateSelector() {
  const sel = document.getElementById('weekSelect');
  sel.innerHTML = '';
  periodLabels.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = label;
    sel.appendChild(opt);
  });
  sel.disabled = false;
  sel.value = 0;
}

/* Wire up period toggle buttons */
function initPeriodToggle() {
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      periodData = aggregateData(allData, weekColumns, currentPeriod);
      populateSelector();
      render(0);
    });
  });
}

/* Wire up the period dropdown selector */
function initSelector() {
  document.getElementById('weekSelect').addEventListener('change', function() {
    render(parseInt(this.value));
  });
}

/* Sidebar navigation — scroll to section or filter to just that section */
function initSidebar() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const sec = item.dataset.section;
      const sections = document.querySelectorAll('.section[data-sec]');

      if (sec === 'all') {
        /* Show all sections */
        sections.forEach(s => s.style.display = '');
      } else {
        /* Show only the selected section */
        sections.forEach(s => {
          s.style.display = s.dataset.sec === sec ? '' : 'none';
        });
      }

      /* Scroll to the top of the dashboard */
      document.getElementById('app').scrollIntoView({ behavior: 'smooth' });
    });
  });
}

/* ══════════════════════════════════════════════════════════
   BOOTSTRAP — Fetch data and render
   ══════════════════════════════════════════════════════════ */

async function fetchAndRender() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Failed to fetch sheet: ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    allData = processData(rows);

    /* Default to weekly view */
    periodData = aggregateData(allData, weekColumns, currentPeriod);
    populateSelector();
    render(0);
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error-msg">Error loading data: ${e.message}<br>Retrying in 30s...</div>`;
    setTimeout(fetchAndRender, 30000);
  }
}

/* Initialize everything */
initPeriodToggle();
initSelector();
initSidebar();
fetchAndRender();

/* Auto-refresh every 5 minutes */
setInterval(fetchAndRender, 5 * 60 * 1000);
</script>
