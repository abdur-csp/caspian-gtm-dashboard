<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caspian Trade — GTM Operating Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex}

/* ── Sidebar ── */
.sidebar{
  width:210px;min-height:100vh;background:#f5f6f8;border-right:1px solid #e4e6ea;
  padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10;
}
.sidebar-logo{padding:0 18px 28px;font-size:19px;font-weight:800;color:#0f3d3e}
.sidebar-logo span{color:#555}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:1px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:12.5px;font-weight:500;
  color:#666;cursor:pointer;border-left:3px solid transparent;transition:all 0.12s;
}
.nav-item:hover{background:#ecedf0;color:#1a1a1a}
.nav-item.active{background:#e4eded;color:#0f3d3e;border-left-color:#0f3d3e;font-weight:700}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.sidebar-footer{padding:16px 18px;font-size:10px;color:#aaa}

/* ── Main ── */
.main{margin-left:210px;flex:1;min-height:100vh}

/* ── Top Bar ── */
.topbar{
  display:flex;justify-content:space-between;align-items:center;padding:14px 32px;
  border-bottom:1px solid #e8e8e8;background:#fff;position:sticky;top:0;z-index:5;
}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-size:16px;font-weight:800;color:#1a1a1a}
.topbar-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:10px;color:#aaa}

/* ── Period Toggle ── */
.period-toggle{display:flex;background:#f0f0f0;border-radius:5px;overflow:hidden}
.period-btn{
  padding:5px 13px;font-size:11px;font-weight:700;font-family:'Archivo',sans-serif;
  border:none;background:transparent;color:#777;cursor:pointer;transition:all 0.12s;
  text-transform:uppercase;letter-spacing:0.3px;
}
.period-btn.active{background:#0f3d3e;color:#fff;border-radius:5px}

/* ── Period Selector ── */
.week-select{
  font-family:'Archivo',sans-serif;font-size:12px;font-weight:600;
  background:#fff;color:#1a1a1a;border:1px solid #d0d0d0;border-radius:5px;
  padding:5px 10px;cursor:pointer;min-width:180px;
}
.week-select:focus{outline:none;border-color:#0f3d3e}

/* ── Dashboard ── */
.dashboard{padding:24px 32px;max-width:1400px}

/* ── Executive Summary ── */
.exec-summary{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;
  padding:20px 0;border-bottom:2px solid #e8e8e8;
}
.exec-kpi{text-align:center}
.exec-kpi .kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#888;margin-bottom:4px}
.exec-kpi .kpi-value{font-size:32px;font-weight:900;color:#0f3d3e;line-height:1.1}
.exec-kpi .kpi-value.neutral-color{color:#1a1a1a}
.exec-kpi .kpi-sub{font-size:11px;color:#999;margin-top:4px}
.exec-kpi .kpi-delta{font-size:11px;font-weight:600;margin-top:2px}
.kpi-delta.up{color:#16a34a}
.kpi-delta.down{color:#dc2626}
.kpi-delta.flat{color:#999}

/* ── Section Headers ── */
.section{margin-bottom:28px}
.section-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.section-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.7px;color:#1a1a1a}

/* ── Operating Table (the core view) ── */
.op-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px}
.op-table thead th{
  text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;
  color:#999;font-weight:700;padding:6px 12px;border-bottom:2px solid #e0e0e0;
}
.op-table thead th:not(:first-child){text-align:right}
.op-table tbody td{
  padding:8px 12px;border-bottom:1px solid #f2f2f2;vertical-align:middle;
}
.op-table tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.op-table tbody tr:hover{background:#fafbfc}
.op-table .metric-name{font-weight:600;color:#1a1a1a;font-size:13px}
.op-table .metric-name.indent{padding-left:28px;font-weight:500;color:#555}
.op-table .val-current{font-weight:700;font-size:14px;color:#1a1a1a}
.op-table .val-current.currency{color:#0f3d3e}
.op-table .val-prior{color:#999;font-weight:500}
.op-table .val-delta{font-weight:600;font-size:12px}
.op-table .val-delta.up{color:#16a34a}
.op-table .val-delta.down{color:#dc2626}
.op-table .val-delta.flat{color:#ccc}
.op-table .snapshot-badge{
  display:inline-block;font-size:9px;background:#f0f0f0;color:#999;
  padding:1px 6px;border-radius:3px;font-weight:600;
}
/* Section subtotal row */
.op-table .subtotal td{border-top:2px solid #e0e0e0;font-weight:800;font-size:14px}

/* ── Funnel ── */
.funnel-container{padding:12px 0 20px}
.funnel-visual{display:flex;flex-direction:column;align-items:center;gap:0;max-width:660px;margin:0 auto}
.funnel-stage{
  position:relative;text-align:center;padding:16px 24px;color:#fff;font-weight:600;
  min-height:64px;transition:transform 0.12s;
}
.funnel-stage:hover{transform:scale(1.02)}
/* Each stage gets its own class for reliable styling */
.funnel-s1{width:100%;background:#0a2e2f;border-radius:8px 8px 0 0}
.funnel-s2{width:78%;background:#0f3d3e}
.funnel-s3{width:56%;background:#1a5c5e}
.funnel-s4{width:36%;background:#267a7d;border-radius:0 0 8px 8px}
.funnel-label{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;opacity:0.8;margin-bottom:3px}
.funnel-value{font-size:28px;font-weight:900}
.funnel-delta{font-size:10px;opacity:0.85;margin-top:2px}
/* Connector arrows between stages */
.funnel-connector{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:8px solid;margin:0}
.funnel-c1{border-top-color:#0a2e2f}
.funnel-c2{border-top-color:#0f3d3e}
.funnel-c3{border-top-color:#1a5c5e}

/* ── Loading / Error ── */
.loading{text-align:center;padding:80px;font-size:14px;color:#999}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid #e8e8e8;border-top-color:#0f3d3e;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:16px;color:#dc2626;text-align:center;margin:40px}

/* ── Responsive ── */
@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0}
  .topbar{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .dashboard{padding:16px}
  .exec-summary{grid-template-columns:repeat(2,1fr);gap:12px}
  .funnel-s1{width:100%}
  .funnel-s2{width:90%}
  .funnel-s3{width:80%}
  .funnel-s4{width:70%}
  .op-table{font-size:12px}
}
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">

  <nav class="sidebar-nav">

<!-- ── Main ── -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Operating Dashboard</div>
      <div class="period-toggle" id="periodToggle">
        <button class="period-btn active" data-period="weekly">Weekly</button>
        <button class="period-btn" data-period="monthly">Monthly</button>
        <button class="period-btn" data-period="quarterly">Quarterly</button>
      </div>
    </div>
    <div class="topbar-right">
      <select class="week-select" id="weekSelect" disabled><option>Loading...</option></select>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </div>
  <div id="app"><div class="loading"><span class="loading-spinner"></span>Loading dashboard data...</div></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   DATA CONFIGURATION
   ══════════════════════════════════════════════════════════ */

const CSV_URL = 'https://docs.google.com/spreadsheets/d/1u-8smcV7dJTRZqGxdpl63GIPZBeBNiTOPnVnjPwDEuQ/gviz/tq?tqx=out:csv&sheet=Weekly%20Metrics%20Tracker';

/* Each key maps to a substring used to find the metric's row in the spreadsheet */
const METRIC_KEYS = {
  linkedinFollowers: 'New LinkedIns Followers',
  websiteVisits: 'Website Visits',
  emailsSent: 'Emails (Lemlist',
  linkedinDMs: 'LinkedIn DMs',
  callsDials: 'Calls+Dials',
  totalTouches: 'Sales Activity (Touches)',
  newCompanies: '# New Companies',
  outboundDeals: '# Outbound Deals',
  inboundDeals: '# Inbound Deals',
  conferenceDeals: '# Conference Deals',
  referrals: '# Referrals',
  totalNewDeals: '# New Deals',
  qualifiedDeals: '# New Qualified Deals',
  discoveryDeals: '# New Discovery Deal',
  newOffers: '# New Offers',
  signedDeals: '# New Committed (Signed)',
  pipelineValue: '$M Pipeline Value',
  uniqueDeals: '# of Unique Deals in Pipeline',
  avgDaysStage: '# Days Avg. Time in Stage',
  appsSubmitted: 'Applications Submitted to CBP',
  appsApproved: 'Applications Approved by CBP',
  appsInReview: 'Applications in Review by CBP',
  uniqueCustomersClaims: '# of Unique Customers w. Claims',
  claimsTransmitted: '$ Claims Transmitted',
  claimsPaid: '$ Claims Paid by CBP',
  bookedRevenue: '$ Booked Revenue',
  collectedRevenue: '$ Collected Revenue',
  claimsAwaitingSub: '# Claims Awaiting Submission',
  claimsAwaitingSubDollar: '$ Claims Awaiting Submission',
  claimsWithCBP: '# Claims With CBP (Awaiting Settlement)',
  claimsWithCBPDollar: '$ Claims With CBP (Awaiting Settlement)',
  revenueAwaitingCollection: '$ Caspian Revenue Awaiting Collection'
};

/* Balance metrics = point-in-time snapshots (use latest, don't sum across periods) */
const BALANCE_METRICS = new Set([
  'pipelineValue','uniqueDeals','avgDaysStage','appsInReview',
  'claimsAwaitingSub','claimsAwaitingSubDollar','claimsWithCBP','claimsWithCBPDollar',
  'revenueAwaitingCollection'
]);

/* Metrics shown as dollar amounts */
const CURRENCY_METRICS = new Set([
  'pipelineValue','claimsTransmitted','claimsPaid','bookedRevenue','collectedRevenue',
  'claimsAwaitingSubDollar','claimsWithCBPDollar','revenueAwaitingCollection'
]);

let allData = null;
let weekColumns = [];
let currentPeriod = 'weekly';
let currentIdx = 0;
let periodData = null;
let periodLabels = [];

/* ══════════════════════════════════════════════════════════
   CSV PARSING
   ══════════════════════════════════════════════════════════ */

function parseCSV(text) {
  const rows = [];
  let current = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(current.trim()); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(current.trim()); current = '';
        rows.push(row); row = [];
        if (ch === '\r') i++;
      } else { current += ch; }
    }
  }
  if (current || row.length) { row.push(current.trim()); rows.push(row); }
  return rows;
}

function findWeekLabelRow(rows) {
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (rows[i].some(c => /^Week \d+$/.test(c))) return i;
  }
  return -1;
}

function findDatesRow(rows) {
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    if (rows[i].some(c => c === 'Week Ending')) return i;
  }
  return -1;
}

function parseValue(raw) {
  if (!raw || raw === '' || raw === '-') return null;
  let s = raw.replace(/^\$/, '').replace(/,/g, '');
  const num = parseFloat(s);
  return isNaN(num) ? null : num;
}

function processData(rows) {
  const weekLabelRowIdx = findWeekLabelRow(rows);
  const datesRowIdx = findDatesRow(rows);
  if (weekLabelRowIdx < 0 || datesRowIdx < 0) throw new Error('Cannot locate week/date headers');

  const weekLabelRow = rows[weekLabelRowIdx];
  const datesRow = rows[datesRowIdx];

  weekColumns = [];
  for (let col = 0; col < weekLabelRow.length; col++) {
    const label = weekLabelRow[col];
    const date = datesRow[col] || '';
    if (/^Week \d+$/.test(label)) {
      weekColumns.push({ col, label, date });
    }
  }

  const metrics = {};
  for (const [key, substring] of Object.entries(METRIC_KEYS)) {
    for (let r = 0; r < rows.length; r++) {
      const metricName = rows[r][3] || rows[r][2] || '';
      if (metricName.includes(substring)) {
        metrics[key] = weekColumns.map(wc => parseValue(rows[r][wc.col]));
        break;
      }
    }
    if (!metrics[key]) metrics[key] = weekColumns.map(() => null);
  }
  return metrics;
}

/* ══════════════════════════════════════════════════════════
   AGGREGATION — Monthly / Quarterly
   ══════════════════════════════════════════════════════════ */

/*
 * Parses M/D or M/D/YY date strings and infers the year.
 * Weeks are ordered most-recent-first in the data, so we walk
 * backwards (oldest first) and increment the year whenever
 * the month jumps down (e.g. Dec → Jan = new year).
 */
function parseWeekDates(weekCols) {
  const parsed = new Array(weekCols.length);

  /* Walk oldest-to-newest (end of array → start) to infer years */
  let currentYear = new Date().getFullYear();

  /* First pass: parse month/day from each date string */
  const raw = weekCols.map(wc => {
    const parts = wc.date.replace(/"/g, '').split('/');
    const mon = parseInt(parts[0]);
    const day = parseInt(parts[1]);
    /* If a 3rd part exists, use it as the year */
    let yr = parts.length >= 3 ? parseInt(parts[2]) : null;
    if (yr !== null && yr < 100) yr += 2000;
    return { mon, day, yr };
  });

  /* Walk from oldest (last index) to newest (index 0) and assign years.
     If the date already has an explicit year, use it.
     Otherwise, infer: start with a base year and bump forward when month wraps. */
  if (raw.length > 0) {
    /* Find the most recent entry with an explicit year, or default to current year for newest */
    let baseYear = raw[0].yr || currentYear;

    /* Since index 0 = most recent, assign that year first then walk backward */
    parsed[0] = new Date(baseYear, raw[0].mon - 1, raw[0].day);

    /* Walk backward from index 1 (second-most-recent) toward oldest */
    for (let i = 1; i < raw.length; i++) {
      const prev = raw[i - 1]; /* more recent entry */
      const curr = raw[i];     /* older entry */
      /* If the older entry has a higher month than the more-recent one,
         it means we crossed a year boundary (e.g. Dec older, Jan newer) */
      if (curr.mon > prev.mon + 1) {
        baseYear--;
      }
      const yr = curr.yr || baseYear;
      parsed[i] = new Date(yr, curr.mon - 1, curr.day);
    }
  }

  return parsed;
}

function aggregateData(rawData, weekCols, period) {
  if (period === 'weekly') {
    periodLabels = weekCols.map(wc => `${wc.label} (ending ${wc.date})`);
    return rawData;
  }

  /* Parse all week dates with year inference */
  const dates = parseWeekDates(weekCols);

  const buckets = {};
  const bucketOrder = [];

  weekCols.forEach((wc, idx) => {
    const d = dates[idx];
    if (!d || isNaN(d.getTime())) return;
    let key;
    if (period === 'monthly') {
      key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    } else {
      const q = Math.ceil((d.getMonth()+1)/3);
      key = `${d.getFullYear()}-Q${q}`;
    }
    if (!buckets[key]) { buckets[key] = []; bucketOrder.push(key); }
    buckets[key].push(idx);
  });

  const aggregated = {};
  for (const mk of Object.keys(rawData)) {
    aggregated[mk] = bucketOrder.map(bk => {
      const indices = buckets[bk];
      if (BALANCE_METRICS.has(mk)) {
        /* Snapshot: use the latest (most recent) week in the bucket */
        return rawData[mk][indices[0]];
      } else {
        /* Flow: sum all non-null values */
        let sum = null;
        for (const i of indices) {
          const v = rawData[mk][i];
          if (v !== null) sum = (sum || 0) + v;
        }
        return sum;
      }
    });
  }

  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  periodLabels = bucketOrder.map(bk => {
    if (period === 'monthly') {
      const [y, m] = bk.split('-');
      return `${monthNames[parseInt(m)-1]} ${y}`;
    }
    return bk.replace('-',' ');
  });

  return aggregated;
}

/* ══════════════════════════════════════════════════════════
   FORMATTING
   ══════════════════════════════════════════════════════════ */

function fmt(val, key) {
  if (val === null || val === undefined) return '—';
  if (key === 'pipelineValue') return '$' + val.toFixed(2) + 'M';
  if (key === 'avgDaysStage') return val.toFixed(0) + ' days';
  if (CURRENCY_METRICS.has(key)) {
    if (Math.abs(val) >= 1000000) return '$' + (val/1000000).toFixed(2) + 'M';
    if (Math.abs(val) >= 1000) return '$' + (val/1000).toFixed(1) + 'K';
    return '$' + val.toLocaleString('en-US', {maximumFractionDigits:0});
  }
  return val.toLocaleString('en-US', {maximumFractionDigits:0});
}

/* Compute the % or absolute change between two values */
function deltaInfo(curr, prev, key) {
  if (BALANCE_METRICS.has(key)) {
    /* For snapshots, show absolute change instead of % */
    if (curr === null || prev === null) return { text: '—', cls: 'flat' };
    const diff = curr - prev;
    if (diff === 0) return { text: '—', cls: 'flat' };
    const sign = diff > 0 ? '+' : '';
    return { text: sign + fmt(diff, key), cls: diff > 0 ? 'up' : 'down' };
  }
  if (curr === null || prev === null || prev === 0) return { text: '—', cls: 'flat' };
  const pct = ((curr - prev) / Math.abs(prev) * 100);
  if (pct === 0) return { text: '—', cls: 'flat' };
  const arrow = pct > 0 ? '\u25B2' : '\u25BC';
  return { text: `${arrow} ${Math.abs(pct).toFixed(1)}%`, cls: pct > 0 ? 'up' : 'down' };
}

/* Period label for table headers (e.g. "Current Week" vs "Current Month") */
function periodNoun() {
  if (currentPeriod === 'weekly') return 'Week';
  if (currentPeriod === 'monthly') return 'Month';
  return 'Quarter';
}

/* ══════════════════════════════════════════════════════════
   TABLE ROW BUILDER — the core operating model view
   ══════════════════════════════════════════════════════════ */

/*
 * Renders a single row in the operating table.
 * label: display name for the metric
 * key: metric key in periodData
 * idx: current period index
 * options: { indent, isCurrency, isSubtotal, isSnapshot }
 */
function tableRow(label, key, idx, options = {}) {
  const d = periodData;
  const curr = d[key][idx];
  const prev = d[key][idx + 1] !== undefined ? d[key][idx + 1] : null;
  const isCurr = options.isCurrency || CURRENCY_METRICS.has(key);
  const di = deltaInfo(curr, prev, key);

  const nameClass = options.indent ? 'metric-name indent' : 'metric-name';
  const valClass = isCurr ? 'val-current currency' : 'val-current';
  const trClass = options.isSubtotal ? 'subtotal' : '';
  const snapshotCol = BALANCE_METRICS.has(key) ? '<span class="snapshot-badge">snapshot</span>' : di.text !== '—' ? `<span class="val-delta ${di.cls}">${di.text}</span>` : '<span class="val-delta flat">—</span>';

  return `<tr class="${trClass}">
    <td class="${nameClass}">${label}</td>
    <td class="${valClass}">${fmt(curr, key)}</td>
    <td class="val-prior">${fmt(prev, key)}</td>
    <td>${snapshotCol}</td>
  </tr>`;
}

/* ══════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════ */

function render(idx) {
  currentIdx = idx;
  const d = periodData;
  const pn = periodNoun();

  /* Executive summary: pull the 4 most important numbers */
  function execKPI(label, key) {
    const curr = d[key][idx];
    const prev = d[key][idx+1] !== undefined ? d[key][idx+1] : null;
    const di = deltaInfo(curr, prev, key);
    const isCurr = CURRENCY_METRICS.has(key);
    return `<div class="exec-kpi">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value${isCurr ? '' : ' neutral-color'}">${fmt(curr, key)}</div>
      <div class="kpi-delta ${di.cls}">${di.text}</div>
    </div>`;
  }

  /* Funnel stage helper — renders one horizontal band of the funnel */
  function funnelDelta(key) {
    const curr = d[key][idx];
    const prev = d[key][idx+1] !== undefined ? d[key][idx+1] : null;
    if (curr === null || prev === null) return '';
    const diff = curr - prev;
    if (diff === 0) return 'No change vs prior';
    const sign = diff > 0 ? '+' : '';
    return `${sign}${diff} vs prior ${pn.toLowerCase()}`;
  }

  const html = `<div class="dashboard">

    <!-- ═══ EXECUTIVE SUMMARY ═══ -->
    <div class="exec-summary">
      ${execKPI('Booked Revenue', 'bookedRevenue')}
      ${execKPI('Pipeline Value', 'pipelineValue')}
      ${execKPI('Deals Signed', 'signedDeals')}
      ${execKPI('Claims Paid by CBP', 'claimsPaid')}
    </div>

    <!-- ═══ REVENUE & FINANCE ═══ -->
    <div class="section" data-sec="revenue">
      <div class="section-header">
        <span class="section-dot" style="background:#0f3d3e"></span>
        <span class="section-title">Revenue & Finance</span>
      </div>
      <table class="op-table">
        <thead><tr>
          <th>Metric</th>
          <th>Current ${pn}</th>
          <th>Prior ${pn}</th>
          <th>Change</th>
        </tr></thead>
        <tbody>
          ${tableRow('Booked Revenue', 'bookedRevenue', idx)}
          ${tableRow('Collected Revenue', 'collectedRevenue', idx)}
          ${tableRow('Revenue Awaiting Collection', 'revenueAwaitingCollection', idx)}
          ${tableRow('Claims Paid by CBP', 'claimsPaid', idx)}
          ${tableRow('Claims Transmitted to CBP', 'claimsTransmitted', idx)}
        </tbody>
      </table>
    </div>

    <!-- ═══ SALES & GTM ═══ -->
    <div class="section" data-sec="sales">
      <div class="section-header">
        <span class="section-dot" style="background:#2563eb"></span>
        <span class="section-title">Sales & Go-to-Market</span>
      </div>
      <table class="op-table">
        <thead><tr>
          <th>Metric</th>
          <th>Current ${pn}</th>
          <th>Prior ${pn}</th>
          <th>Change</th>
        </tr></thead>
        <tbody>
          ${tableRow('New Companies Added', 'newCompanies', idx)}
          ${tableRow('Total New Deals', 'totalNewDeals', idx, {isSubtotal: true})}
          ${tableRow('Outbound Deals', 'outboundDeals', idx, {indent: true})}
          ${tableRow('Inbound Deals', 'inboundDeals', idx, {indent: true})}
          ${tableRow('Conference Deals', 'conferenceDeals', idx, {indent: true})}
          ${tableRow('Referrals', 'referrals', idx, {indent: true})}
          ${tableRow('Total Sales Touches', 'totalTouches', idx, {isSubtotal: true})}
          ${tableRow('Emails Sent (Lemlist)', 'emailsSent', idx, {indent: true})}
          ${tableRow('LinkedIn DMs', 'linkedinDMs', idx, {indent: true})}
          ${tableRow('Calls / Dials', 'callsDials', idx, {indent: true})}
          ${tableRow('LinkedIn New Followers', 'linkedinFollowers', idx)}
          ${tableRow('Website Visits', 'websiteVisits', idx)}
        </tbody>
      </table>
    </div>

    <!-- ═══ PIPELINE FUNNEL ═══ -->
    <div class="section" data-sec="pipeline">
      <div class="section-header">
        <span class="section-dot" style="background:#f59e0b"></span>
        <span class="section-title">Pipeline — Funnel</span>
      </div>

      <!-- Visual funnel — explicit class per stage for reliable color -->
      <div class="funnel-container">
        <div class="funnel-visual">
          <div class="funnel-stage funnel-s1">
            <div class="funnel-label">Qualified</div>
            <div class="funnel-value">${fmt(d.qualifiedDeals[idx], 'qualifiedDeals')}</div>
            <div class="funnel-delta">${funnelDelta('qualifiedDeals')}</div>
          </div>
          <div class="funnel-connector funnel-c1"></div>
          <div class="funnel-stage funnel-s2">
            <div class="funnel-label">Discovery</div>
            <div class="funnel-value">${fmt(d.discoveryDeals[idx], 'discoveryDeals')}</div>
            <div class="funnel-delta">${funnelDelta('discoveryDeals')}</div>
          </div>
          <div class="funnel-connector funnel-c2"></div>
          <div class="funnel-stage funnel-s3">
            <div class="funnel-label">Offer</div>
            <div class="funnel-value">${fmt(d.newOffers[idx], 'newOffers')}</div>
            <div class="funnel-delta">${funnelDelta('newOffers')}</div>
          </div>
          <div class="funnel-connector funnel-c3"></div>
          <div class="funnel-stage funnel-s4">
            <div class="funnel-label">Signed</div>
            <div class="funnel-value">${fmt(d.signedDeals[idx], 'signedDeals')}</div>
            <div class="funnel-delta">${funnelDelta('signedDeals')}</div>
          </div>
        </div>
      </div>

      <!-- Pipeline summary in table format -->
      <table class="op-table">
        <thead><tr>
          <th>Pipeline Metric</th>
          <th>Current ${pn}</th>
          <th>Prior ${pn}</th>
          <th>Change</th>
        </tr></thead>
        <tbody>
          ${tableRow('Pipeline Value', 'pipelineValue', idx)}
          ${tableRow('Unique Deals in Pipeline', 'uniqueDeals', idx)}
          ${tableRow('Avg. Days in Stage', 'avgDaysStage', idx)}
          ${tableRow('New Qualified Deals', 'qualifiedDeals', idx)}
          ${tableRow('New Discovery Deals', 'discoveryDeals', idx)}
          ${tableRow('New Offers', 'newOffers', idx)}
          ${tableRow('New Signed Deals', 'signedDeals', idx)}
        </tbody>
      </table>
    </div>

    <!-- ═══ OPERATIONS ═══ -->
    <div class="section" data-sec="operations">
      <div class="section-header">
        <span class="section-dot" style="background:#8b5cf6"></span>
        <span class="section-title">Operations — CBP Applications</span>
      </div>
      <table class="op-table">
        <thead><tr>
          <th>Metric</th>
          <th>Current ${pn}</th>
          <th>Prior ${pn}</th>
          <th>Change</th>
        </tr></thead>
        <tbody>
          ${tableRow('Applications Submitted', 'appsSubmitted', idx)}
          ${tableRow('Applications Approved', 'appsApproved', idx)}
          ${tableRow('Applications in Review', 'appsInReview', idx)}
          ${tableRow('Unique Customers w/ Claims', 'uniqueCustomersClaims', idx)}
        </tbody>
      </table>
    </div>

    <!-- ═══ CLAIMS PIPELINE ═══ -->
    <div class="section" data-sec="claims">
      <div class="section-header">
        <span class="section-dot" style="background:#ef4444"></span>
        <span class="section-title">Claims Pipeline — Stage Breakdown</span>
      </div>
      <table class="op-table">
        <thead><tr>
          <th>Stage</th>
          <th>Count</th>
          <th>Dollar Value</th>
          <th>Status</th>
        </tr></thead>
        <tbody>
          <tr>
            <td class="metric-name">Awaiting Submission</td>
            <td class="val-current">${fmt(d.claimsAwaitingSub[idx], 'claimsAwaitingSub')}</td>
            <td class="val-current currency">${fmt(d.claimsAwaitingSubDollar[idx], 'claimsAwaitingSubDollar')}</td>
            <td><span class="snapshot-badge">snapshot</span></td>
          </tr>
          <tr>
            <td class="metric-name">Transmitted to CBP</td>
            <td class="val-current">—</td>
            <td class="val-current currency">${fmt(d.claimsTransmitted[idx], 'claimsTransmitted')}</td>
            <td><span class="val-delta ${deltaInfo(d.claimsTransmitted[idx], d.claimsTransmitted[idx+1], 'claimsTransmitted').cls}">${deltaInfo(d.claimsTransmitted[idx], d.claimsTransmitted[idx+1], 'claimsTransmitted').text}</span></td>
          </tr>
          <tr>
            <td class="metric-name">With CBP (Awaiting Settlement)</td>
            <td class="val-current">${fmt(d.claimsWithCBP[idx], 'claimsWithCBP')}</td>
            <td class="val-current currency">${fmt(d.claimsWithCBPDollar[idx], 'claimsWithCBPDollar')}</td>
            <td><span class="snapshot-badge">snapshot</span></td>
          </tr>
          <tr>
            <td class="metric-name">Paid by CBP</td>
            <td class="val-current">—</td>
            <td class="val-current currency">${fmt(d.claimsPaid[idx], 'claimsPaid')}</td>
            <td><span class="val-delta ${deltaInfo(d.claimsPaid[idx], d.claimsPaid[idx+1], 'claimsPaid').cls}">${deltaInfo(d.claimsPaid[idx], d.claimsPaid[idx+1], 'claimsPaid').text}</span></td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>`;

  document.getElementById('app').innerHTML = html;
}

/* ══════════════════════════════════════════════════════════
   CONTROLS
   ══════════════════════════════════════════════════════════ */

function populateSelector() {
  const sel = document.getElementById('weekSelect');
  sel.innerHTML = '';
  periodLabels.forEach((label, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = label;
    sel.appendChild(opt);
  });
  sel.disabled = false;
  sel.value = 0;
}

function initPeriodToggle() {
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      periodData = aggregateData(allData, weekColumns, currentPeriod);
      populateSelector();
      render(0);
    });
  });
}

function initSelector() {
  document.getElementById('weekSelect').addEventListener('change', function() {
    render(parseInt(this.value));
  });
}

function initSidebar() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const sec = item.dataset.section;
      const sections = document.querySelectorAll('.section[data-sec]');
      if (sec === 'all') {
        sections.forEach(s => s.style.display = '');
      } else {
        sections.forEach(s => { s.style.display = s.dataset.sec === sec ? '' : 'none'; });
      }
      document.getElementById('app').scrollIntoView({ behavior: 'smooth' });
    });
  });
}

/* ══════════════════════════════════════════════════════════
   BOOTSTRAP
   ══════════════════════════════════════════════════════════ */

async function fetchAndRender() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    allData = processData(rows);
    periodData = aggregateData(allData, weekColumns, currentPeriod);
    populateSelector();
    render(0);
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error-msg">Error loading data: ${e.message}<br>Retrying in 30s...</div>`;
    setTimeout(fetchAndRender, 30000);
  }
}

initPeriodToggle();
initSelector();
initSidebar();
fetchAndRender();
setInterval(fetchAndRender, 5 * 60 * 1000);
</script>
</body>
</html>
